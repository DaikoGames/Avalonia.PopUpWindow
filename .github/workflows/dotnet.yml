# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  schedule:
     - cron: '30 14 * * 6' 
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Pack Nuget Package
      run: dotnet pack -c Release  -p:Version=1.0.8.${{github.run_number}} -p:PackageLicenseExpression=MIT -p:RepositoryUrl="https://github.com/DaikoGames/Avalonia.PopUpWindow/" -o publish
    - name: Publish to Github
      uses: softprops/action-gh-release@v2
      with:
        tag_name: 1.0.8.${{github.run_number}}
        files: ./publish/PopUpWindow.1.0.8.${{github.run_number}}.nupkg
      env:
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

    - name: Publish to Nuget
      run: dotnet nuget push ./publish/*.nupkg --api-key ${{ secrets.APIKey }} --source https://api.nuget.org/v3/index.json --skip-duplicate
